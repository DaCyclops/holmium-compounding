[technology-description]
holmium-compounding-tier1=By applying addtional processing, supply of Holmium Ore can be furthur refined before made into solution. Results in about 40% extra solution before productivity.
holmium-compounding-tier2=Furthur processing applied to Holmium Concentrate allows for growing very pure crystalized Holmium powder, which can be mixed into Holmium Solution much more efficiently. Results in around double the solution before productivity.
holmium-compounding-tier3=Improvements to the processes allows for advanced facilities to be used. Unlocks Foundry, Electromagenetic Plant, Centrifuge and Cryogenic Plant to craft the recipes. These provide faster processing, and even extra productivity. 